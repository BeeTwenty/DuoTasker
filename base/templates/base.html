<!DOCTYPE html>
{% load i18n %}
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <title>DuoTasker</title>
    {% load django_simple_bulma %}
    {% bulma %}
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/static/favicon.ico"/>
    <link rel="manifest" href="/static/manifest.json">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/brands.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet" type="text/css">
    <meta name="theme-color" content="#000000"/>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/static/js/serviceworker.js').then(function(registration) {
          // Registration was successful
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function(err) {
          // registration failed :(
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
</script>



</head>
<body>
<section class="section" style="padding-bottom: 0.75rem;">
  <div class="container" style="display: flex; justify-content: flex-end;">
    <form action="{% url 'set_language' %}" method="post" style="display: flex; gap: 0.5rem; align-items: center;">
      {% csrf_token %}
      <label class="label" for="language-select" style="margin-bottom: 0;">{% trans "Language" %}</label>
      <div class="select is-small">
        <select id="language-select" name="language" onchange="this.form.submit()">
          <option value="en" {% if LANGUAGE_CODE == 'en' %}selected{% endif %}>English</option>
          <option value="nb" {% if LANGUAGE_CODE == 'nb' %}selected{% endif %}>Norsk</option>
        </select>
      </div>
      <input type="hidden" name="next" value="{{ request.get_full_path }}">
    </form>
  </div>
</section>
{% block content %}
{% endblock %}
</body>
</html>
