{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-5-tablet is-4-desktop is-3-widescreen">
                <form action="{% url 'login' %}" method="post" class="box">
                    {% csrf_token %}
                    <div class="field">
                        <label for="username" class="label">{% trans "Username" %}</label>
                        <div class="control has-icons-left">
                            <input type="text" name="username" id="username" placeholder="{% trans 'Your username' %}" class="input" required>
                            <span class="icon is-small is-left">
                                <i class="fa fa-user"></i>
                            </span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="password" class="label">{% trans "Password" %}</label>
                        <div class="control has-icons-left">
                            <input type="password" name="password" id="password" placeholder="{% trans 'Your password' %}" class="input" required>
                            <span class="icon is-small is-left">
                                <i class="fa fa-lock"></i>
                            </span>
                        </div>
                    </div>

                    <div class="field">
                        <button type="submit" class="button is-success">
                            {% trans "Login" %}
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
