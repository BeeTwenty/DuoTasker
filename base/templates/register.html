{% extends 'base.html' %}

{% block content %}
<div class="section">
	<div class="container">
		<div class="columns is-centered">
			<div class="column is-6-tablet is-5-desktop is-4-widescreen">
				<form method="post" class="box">
					{% csrf_token %}
					<h1 class="title is-4">Create Account</h1>

					{% if form.errors %}
						<article class="message is-danger">
							<div class="message-body">
								Please fix the errors below.
							</div>
						</article>
					{% endif %}

					<div class="field">
						<label class="label" for="id_username">Username</label>
						<div class="control">
							{{ form.username }}
						</div>
					</div>

					<div class="field">
						<label class="label" for="id_password1">Password</label>
						<div class="control">
							{{ form.password1 }}
						</div>
					</div>

					<div class="field">
						<label class="label" for="id_password2">Confirm Password</label>
						<div class="control">
							{{ form.password2 }}
						</div>
					</div>

					<div class="field is-grouped is-justify-content-space-between">
						<div class="control">
							<button type="submit" class="button is-primary">Register</button>
						</div>
						<div class="control">
							<a href="{% url 'login' %}" class="button is-light">Back to Login</a>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
